################################################################################
# drift-detection.yml — Scheduled Terraform Drift Detection
#
# PURPOSE:
#   Runs `terraform plan` on a schedule to detect infrastructure drift.
#   If drift is detected (manual changes made outside Terraform), it
#   creates an issue and notifies the team.
#
# WHY:
#   Even with Terraform, engineers sometimes make manual changes via the
#   GCP Console or gcloud CLI. Drift detection catches these before they
#   cause deployment failures or security issues.
#
# SCHEDULE:
#   Runs daily at 06:00 UTC (Monday–Friday)
################################################################################

name: "Drift Detection"

on:
  schedule:
    - cron: "0 6 * * 1-5"  # Weekdays at 06:00 UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: read
  issues: write

jobs:
  detect-drift:
    name: "Detect Drift — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add services here as they are onboarded
        include:
          - service: "payments-api"
            environment: "production"
            config_path: "configs/examples/appengine-service.json"

    steps:
      - name: Checkout CI/CD repo
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Resolve config
        id: resolve
        run: |
          chmod +x scripts/resolve-env.sh
          RESOLVED=$(./scripts/resolve-env.sh "${{ matrix.config_path }}" "${{ matrix.environment }}")
          echo "$RESOLVED" > terraform/resolved.auto.tfvars.json

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="prefix=${{ matrix.service }}/${{ matrix.environment }}"

      - name: Terraform Plan (Drift Check)
        id: plan
        working-directory: terraform
        run: |
          terraform plan -detailed-exitcode -no-color 2>&1 | tee drift_output.txt
        continue-on-error: true

      - name: Create issue on drift
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const drift = fs.readFileSync('terraform/drift_output.txt', 'utf8');
            const truncated = drift.length > 50000
              ? drift.substring(0, 50000) + '\n... (truncated)'
              : drift;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Infrastructure Drift Detected: ${{ matrix.service }} (${{ matrix.environment }})`,
              body: `## Infrastructure Drift Detected

            **Service:** \`${{ matrix.service }}\`
            **Environment:** \`${{ matrix.environment }}\`
            **Detected:** ${new Date().toISOString()}

            <details>
            <summary>Terraform Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            ### Action Required
            1. Review the drift above
            2. If intentional, update the deploy.json config to match
            3. If unintentional, run the deployment pipeline to reconcile

            /cc @${{ matrix.service }}-team`,
              labels: ['infrastructure', 'drift-detected']
            });
